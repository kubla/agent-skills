<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fulcra Dashboard</title>
    <!-- Tailwind CSS (CDN is permitted for GitHub Pages/Static deployment) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- External Theming CSS -->
    <link rel="stylesheet" href="theme.css">

    <!-- Alpine.js & D3.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>

<script>
window.onerror = function(msg, url, lineNo, columnNo, error) {
    fetch('/api/chat', {method: 'POST', body: JSON.stringify({error: msg, line: lineNo})});
};
window.addEventListener('unhandledrejection', function(event) {
    fetch('/api/chat', {method: 'POST', body: JSON.stringify({promiseError: event.reason ? event.reason.message : 'Unknown'})});
});
</script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen relative" x-data="dashboard()">
    
    <!-- ========================================== -->
    <!-- 🏛️ PROVINCE: DASHBOARD LAYOUT & UI         -->
    <!-- ========================================== -->
    <main class="max-w-6xl mx-auto p-6 relative z-10 layout-container">
        
        <!-- Hero Header -->
        <header class="mb-12 border-b pb-8 relative rounded-xl overflow-hidden shadow-sm hero-header">
            <!-- Dynamic Hero Image Fallback/Background -->
            <div class="hero-art-container absolute inset-0 z-0">
                <!-- Agents: Inject the generated image source here -->
                <img id="hero-img" src="" alt="Theme Art" class="hero-img" style="display:none;" onload="this.style.display='block'" onerror="this.style.display='none'">
            </div>
            
            <div class="relative z-20 p-8 pt-16 hero-content">
                <!-- Agents: Inject custom CSS animations/elements into this layer -->
                <div class="animation-layer"></div>
                
                <h1 class="text-5xl font-bold mb-4 flex items-center gap-4 dashboard-title">
                    <span class="title-icon">📊</span>
                    <span class="title-text">Fulcra Dashboard</span>
                </h1>
                <p class="text-xl subtitle">A canvas for your data.</p>
            </div>
        </header>

        <!-- Dynamic Timelines -->
        <div class="grid grid-cols-1 gap-8 mb-12">
            <template x-for="timeline in timelines" :key="timeline.id">
                <section class="card bg-white p-6 rounded-xl border border-gray-200 shadow-sm" x-data="timelineComponent(timeline)">
                    <h2 class="text-2xl font-semibold mb-4 border-b border-gray-100 pb-2 flex items-center gap-3 timeline-title">
                        <span x-text="timeline.icon" class="timeline-icon"></span>
                        <span x-text="timeline.title"></span>
                    </h2>
                    
                    <div class="chart-container w-full h-32 relative" x-ref="chartZone" @timeline-hover="hoverIndex = $event.detail.index"></div>
                    
                    <!-- Logs List -->
                    <div class="mt-6 flex flex-col gap-4">
                        <template x-for="detail in displayedDetails" :key="detail.item.recorded_at">
                            <div class="flex gap-4 items-start p-4 rounded-lg border transition-all duration-300 relative overflow-hidden bg-gray-50 log-entry"
                                 :style="detail.isHovered ? `border-color: ${timeline.color}; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); transform: scale(1.01);` : 'border-color: #e5e7eb;'">
                                
                                <div class="w-12 h-12 flex-shrink-0 flex items-center justify-center rounded-full border bg-white z-10 log-icon-wrapper"
                                     :style="`border-color: ${detail.isHovered ? timeline.color : '#e5e7eb'}; color: ${timeline.color};`">
                                    <span class="text-xl" x-text="getIcon(detail.item)"></span>
                                </div>
                                
                                <div class="flex-1 z-10">
                                    <div class="flex justify-between items-center mb-2 border-b border-gray-200 pb-2 log-header">
                                        <h4 class="font-semibold text-gray-800 m-0 text-sm" 
                                            x-text="detail.item.parsedDate.toLocaleString(undefined, { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })">
                                        </h4>
                                        <span class="text-xs font-bold uppercase tracking-wider px-2 py-1 rounded-full border log-badge"
                                              x-text="getTier(detail.item)">
                                        </span>
                                    </div>
                                    <p class="text-sm text-gray-600 m-0 log-body">
                                        <strong class="text-gray-900" x-text="detail.item.label || detail.item.type"></strong><br/>
                                        <span x-text="detail.item.details || detail.item.size || ''"></span>
                                    </p>
                                </div>
                            </div>
                        </template>
                    </div>
                </section>
            </template>
        </div>

        <!-- Records Processed Bar Chart -->
        <section class="card bg-white p-6 rounded-xl border border-gray-200 shadow-sm mb-12" x-show="recordsProcessed.length > 0" x-data="barChartComponent()" x-effect="updateChart(recordsProcessed)">
            <h2 class="text-2xl font-semibold mb-4 border-b border-gray-100 pb-2 flex items-center gap-3 timeline-title">
                <span class="timeline-icon">📊</span>
                <span>Records Processed (Data Volume)</span>
            </h2>
            <div class="w-full relative" style="min-height: 300px;" x-ref="barChartZone"></div>
        </section>
        
    </main>

    <!-- ========================================== -->
    <!-- 🧠 PROVINCE: ALPINE.JS STATE & LOGIC       -->
    <!-- ========================================== -->
    <script>
        document.addEventListener('alpine:init', () => {
            
            Alpine.data('dashboard', () => ({
                timelines: [],
                recordsProcessed: [],
                
                async init() {
                    try {
                        // Use a cache-buster so local development always gets fresh data
                        const response = await fetch('data.json?t=' + Date.now());
                        const data = await response.json();
                        this.timelines = data.timelines || [];
                        this.recordsProcessed = data.recordsProcessed || [];
                        console.log("Dashboard initialized with", this.timelines.length, "timelines.");
                    } catch (err) {
                        console.error("Failed to load dashboard data", err);
                    }
                }
            }));

            Alpine.data('timelineComponent', (timeline) => ({
                hoverIndex: null,
                parsedData: [],
                
                init() {
                    // Parse dates once
                    this.parsedData = (timeline.data || []).map(d => ({
                        ...d,
                        parsedDate: new Date(d.recorded_at || d.time || d.date)
                    })).sort((a, b) => a.parsedDate - b.parsedDate);
                    
                    // Give DOM a tick to un-hide the container before drawing
                    this.$nextTick(() => {
                        if (this.parsedData.length > 0 && this.$refs.chartZone) {
                            drawD3Timeline(this.parsedData, this.$refs.chartZone, timeline.color);
                        }
                    });
                },
                
                get displayedDetails() {
                    if (this.parsedData.length === 0) return [];
                    let startIndex = this.hoverIndex !== null ? this.hoverIndex : this.parsedData.length - 1;
                    let details = [];
                    for (let i = 0; i < 5; i++) {
                        let idx = startIndex - i;
                        if (idx >= 0 && idx < this.parsedData.length) {
                            details.push({ item: this.parsedData[idx], isHovered: this.hoverIndex === idx });
                        }
                    }
                    return details;
                },
                
                getIcon(d) {
                    if (d.type === 'backup' || (d.label && d.label.toLowerCase().includes('backup'))) return '💾';
                    if (d.type === 'annotation' || (d.label && d.label.toLowerCase().includes('note'))) return '📝';
                    return '⏺️';
                },
                
                getTier(d) {
                    if (d.type === 'backup' || (d.label && d.label.toLowerCase().includes('backup'))) return 'Archival';
                    if (d.type === 'annotation' || (d.label && d.label.toLowerCase().includes('note'))) return 'Annotation';
                    return 'Event';
                }
            }));

            Alpine.data('barChartComponent', () => ({
                init() {
                    // Initialization can be empty; x-effect handles the drawing
                },
                
                updateChart(data) {
                    if (data && data.length > 0 && this.$refs.barChartZone) {
                        // Small delay to ensure the div is fully un-hidden by x-show before drawing
                        setTimeout(() => {
                            drawD3BarChart(data, this.$refs.barChartZone);
                        }, 50);
                    }
                }
            }));
        });
        
        // --- D3 Drawing Functions ---
        function drawD3BarChart(data, container) {
            d3.select(container).selectAll("*").remove();
            
            const margin = { top: 30, right: 30, bottom: 40, left: 150 };
            const width = container.clientWidth - margin.left - margin.right || 600;
            const height = Math.max(250, data.length * 40);

            const svg = d3.select(container).append("svg")
                .attr("width", width + margin.left + margin.right)
                .attr("height", height + margin.top + margin.bottom)
                .append("g")
                .attr("transform", `translate(${margin.left},${margin.top})`);

            // Sort data largest to smallest
            const sortedData = [...data].sort((a, b) => b.count - a.count);

            const x = d3.scaleLinear()
                .domain([0, d3.max(sortedData, d => d.count)])
                .range([0, width]);

            svg.append("g")
                .attr("transform", `translate(0,${height})`)
                .call(d3.axisBottom(x).ticks(5))
                .attr("color", "#a0aec0")
                .selectAll("text").style("font-family", "inherit").style("fill", "#718096");

            const y = d3.scaleBand()
                .range([0, height])
                .domain(sortedData.map(d => d.type))
                .padding(.1);

            svg.append("g")
                .call(d3.axisLeft(y))
                .attr("color", "#a0aec0")
                .selectAll("text").style("font-family", "inherit").style("fill", "#718096").style("font-size", "12px");

            const colorScale = d3.scaleOrdinal()
                .domain(sortedData.map(d => d.type))
                .range(d3.quantize(t => d3.interpolateBlues(t * 0.8 + 0.2), sortedData.length).reverse());

            svg.selectAll("myRect")
                .data(sortedData).enter().append("rect")
                .attr("x", x(0))
                .attr("y", d => y(d.type))
                .attr("width", d => x(d.count))
                .attr("height", y.bandwidth())
                .attr("fill", d => colorScale(d.type))
                .attr("rx", 4)
                .style("opacity", 0.8)
                .on("mouseover", function() { d3.select(this).style("opacity", 1).attr("stroke", "#fff").attr("stroke-width", 1); })
                .on("mouseout", function() { d3.select(this).style("opacity", 0.8).attr("stroke", "none"); });

            svg.selectAll(".text")
                .data(sortedData).enter().append("text")
                .attr("y", d => y(d.type) + y.bandwidth() / 2 + 4)
                .attr("x", d => x(d.count) + 5)
                .text(d => d.count.toLocaleString())
                .style("fill", "#2d3748").style("font-size", "12px").style("font-family", "inherit");
        }

        function drawD3Timeline(parsedData, container, color) {
            d3.select(container).selectAll("*").remove();
            
            const width = container.clientWidth || 800;
            const height = container.clientHeight || 120;
            const margin = { top: 20, right: 30, bottom: 30, left: 30 };

            const svg = d3.select(container).append("svg")
                .attr("width", width).attr("height", height)
                .style("overflow", "visible");

            const x = d3.scaleTime()
                .domain(d3.extent(parsedData, d => d.parsedDate))
                .range([margin.left, width - margin.right]);

            const xAxis = d3.axisBottom(x).ticks(5).tickFormat(d3.timeFormat("%b %d, %H:%M"));
            
            svg.append("g")
                .attr("transform", `translate(0,${height - margin.bottom})`)
                .call(xAxis)
                .attr("color", "#a0aec0")
                .selectAll("text").style("font-family", "inherit");

            svg.append("line")
                .attr("x1", margin.left).attr("y1", (height - margin.bottom) / 2)
                .attr("x2", width - margin.right).attr("y2", (height - margin.bottom) / 2)
                .attr("stroke", "#e2e8f0").attr("stroke-width", 2);

            svg.selectAll(".dot")
                .data(parsedData).enter().append("circle")
                .attr("class", "dot")
                .attr("cx", d => x(d.parsedDate))
                .attr("cy", (height - margin.bottom) / 2)
                .attr("r", 6).attr("fill", color)
                .attr("stroke", "#fff").attr("stroke-width", 2)
                .style("cursor", "pointer")
                .on("mouseover", function(event, d) {
                    d3.select(this).transition().duration(100).attr("r", 10);
                    const idx = parsedData.indexOf(d);
                    container.dispatchEvent(new CustomEvent('timeline-hover', { detail: { index: idx } }));
                })
                .on("mouseout", function(event, d) {
                    d3.select(this).transition().duration(200).attr("r", 6);
                    container.dispatchEvent(new CustomEvent('timeline-hover', { detail: { index: null } }));
                });
        }
    </script>
</body>
</html>
