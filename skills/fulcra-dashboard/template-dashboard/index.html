<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fulcra Dashboard</title>
    <link rel="stylesheet" href="theme.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="envoy.js"></script>

<script>
window.onerror = function(msg, url, lineNo, columnNo, error) {
    fetch('/api/chat', {method: 'POST', body: JSON.stringify({error: msg, line: lineNo})});
};
window.addEventListener('unhandledrejection', function(event) {
    fetch('/api/chat', {method: 'POST', body: JSON.stringify({promiseError: event.reason ? event.reason.message : 'Unknown'})});
});
</script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen relative" x-data="dashboard()">
    
    <main class="layout-container">
        <!-- Hero Header -->
        <header class="hero-header glass-panel">
            <div class="hero-art-container">
                <img id="hero-img" src="" alt="Theme Art" class="hero-img" style="display:none;" onload="this.style.display='block'" onerror="this.style.display='none'">
                <div class="gradient-overlay"></div>
            </div>
            
            <div class="hero-content">
                <div class="animation-layer">
                    <div class="floating-particle p1"></div>
                    <div class="floating-particle p2"></div>
                    <div class="floating-particle p3"></div>
                </div>
                
                <h1 class="dashboard-title">
                    <span class="title-text glow-text">FULCRA DASHBOARD</span>
                </h1>
                <div class="title-separator"></div>
                <p class="subtitle">A canvas for your data.</p>
                <p class="dashboard-summary" x-text="dashboardSummary"></p>
                <p class="dashboard-date" x-text="'Last Synced: ' + syncDate"></p>
                <div class="status-badge">
                    <span class="pulse-dot"></span>
                    SYNC ALIGNED
                </div>
            </div>
        </header>

        <!-- Main Dashboard Grid -->
        <div class="dashboard-bento-grid">
            
            <!-- Left Column: Core Metrics & Agent Vault -->
            <div class="bento-col-left">

                <!-- Agent Vault -->
                <section class="card glass-panel local-only">
                    <div class="card-header">
                        <div class="header-icon-box">💾</div>
                        <h2 class="timeline-title">Agent Vault</h2>
                    </div>
                    <div class="logs-container">
                        <a href="/api/download?file=agent/treecle/memory/memory.gz" class="log-entry modern-entry" style="text-decoration: none;">
                            <div class="entry-time"><div class="time-dot" style="background-color: var(--chart-line-1);"></div></div>
                            <div class="entry-content">
                                <div class="entry-header">
                                    <strong class="entry-label">memory.gz</strong>
                                    <span class="entry-value" style="font-size: 0.8rem; color: var(--text-muted);">Archive</span>
                                </div>
                                <p class="entry-note">Click to download</p>
                            </div>
                        </a>
                        <a href="/api/download?file=agent/treecle/memory/top_of_mind.md" class="log-entry modern-entry" style="text-decoration: none;">
                            <div class="entry-time"><div class="time-dot" style="background-color: var(--chart-line-1);"></div></div>
                            <div class="entry-content">
                                <div class="entry-header">
                                    <strong class="entry-label">top_of_mind.md</strong>
                                    <span class="entry-value" style="font-size: 0.8rem; color: var(--text-muted);">Current State</span>
                                </div>
                                <p class="entry-note">Click to download</p>
                            </div>
                        </a>
                    </div>
                </section>
                
                <!-- Records Processed Chart -->
                <section class="card glass-panel bar-chart-card" x-show="recordsProcessed.length > 0" x-data="barChartComponent()" x-effect="updateChart(recordsProcessed)">
                    <div class="card-header">
                        <div class="header-icon-box">📊</div>
                        <h2 class="timeline-title">Data Velocity</h2>
                    </div>
                    <div class="chart-container bar-chart-zone" x-ref="barChartZone" style="flex: 1; min-height: 140px;"></div>
                </section>
                
                <!-- Chat Envoy block injected into bento -->
                <!-- The agent must rename "Relay" to match the chosen theme -->
                <section class="card glass-panel local-only chat-envoy-card" x-data="chatEnvoy()">
                    <div class="card-header">
                        <div class="header-icon-box">🛰️</div>
                        <h2 class="timeline-title">Relay</h2>
                        <div class="status-indicator" :class="isTyping ? 'typing' : 'active'"></div>
                    </div>
                    
                    <div class="chat-window sleek-scroll" x-ref="chatWindow">
                        <template x-for="msg in messages" :key="Math.random()">
                            <div class="message" :class="msg.role">
                                <div class="bubble" x-text="msg.text"></div>
                            </div>
                        </template>
                        <div class="message assistant typing-indicator" x-show="isTyping">
                            <div class="bubble">...</div>
                        </div>
                    </div>
                    
                    <div class="chat-input-area">
                        <textarea x-model="input" x-ref="chatInput" @input="$el.style.height = 'auto'; $el.style.height = ($el.scrollHeight) + 'px'" @keydown="handleKeydown" placeholder="Transmit coordinates..." rows="1" style="overflow-y: hidden;"></textarea>
                        <button @click="sendMessage" :disabled="isTyping || !input.trim()">Send</button>
                    </div>
                </section>
            </div>

            <!-- Right Column: Chronological Timelines -->
            <div class="bento-col-right timelines-grid">
                <template x-for="timeline in timelines" :key="timeline.id">
                    <section class="card glass-panel timeline-card" x-data="timelineComponent(timeline)">
                        <div class="card-header">
                            <div class="header-icon-box" x-text="timeline.icon"></div>
                            <div class="header-text-group">
                                <h2 class="timeline-title" x-text="timeline.title"></h2>
                                <p class="timeline-description" x-show="timeline.description" x-text="timeline.description"></p>
                            </div>
                            <div class="log-count-badge" x-text="displayedDetails.length + ' entries'"></div>
                        </div>
                        
                        <div class="chart-container timeline-chart-zone" x-ref="chartZone" @timeline-hover="hoverIndex = $event.detail.index"></div>
                        
                        <!-- Minimalist Logs List -->
                        <div class="logs-container sleek-scroll">
                            <template x-for="detail in displayedDetails" :key="detail.item.recorded_at">
                                <div class="log-entry modern-entry"
                                     :class="detail.isHovered ? 'hovered active-glow' : ''"
                                     :style="detail.isHovered ? `--entry-color: ${timeline.color};` : ''">
                                    
                                    <div class="entry-time">
                                        <div class="time-dot" :style="`background-color: ${timeline.color};`"></div>
                                        <span x-text="detail.item.parsedDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})"></span>
                                    </div>
                                    
                                    <div class="entry-content">
                                        <div class="entry-header">
                                            <strong class="entry-label" x-text="detail.item.label || detail.item.type"></strong>
                                            <span class="entry-value" x-html="formatValue(detail.item)"></span>
                                        </div>
                                        <p class="entry-note" x-show="detail.item.note" x-text="detail.item.note"></p>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </section>
                </template>
            </div>
            
        </div>
        
        <!-- Fun Footer -->
        <footer class="glass-panel text-center" style="margin-top: 2rem; padding: 2rem;">
            <p style="color: var(--text-muted); font-size: 0.9rem;">
                <span style="font-size: 1.5rem; display: block; margin-bottom: 0.5rem;">✨ 🦕 ✨</span>
                Powered by Fulcra. Let's build something awesome.
            </p>
        </footer>
    </main>

    <!-- ========================================== -->
    <!-- 🧠 PROVINCE: ALPINE.JS STATE & LOGIC       -->
    <!-- ========================================== -->
    <script>
        document.addEventListener('alpine:init', () => {
            
            Alpine.data('dashboard', () => ({
                timelines: [],
                recordsProcessed: [],
                dashboardSummary: '',
                syncDate: new Date().toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }),
                
                async init() {
                    try {
                        const response = await fetch('data.json?t=' + Date.now());
                        const config = await response.json();
                        
                        this.dashboardSummary = config.summary || 'A high-altitude view of your tracked data.';
                        
                        const fetchJsonl = async (url) => {
                            if (!url) return [];
                            try {
                                const res = await fetch(url + '?t=' + Date.now());
                                if (!res.ok) return [];
                                const text = await res.text();
                                return text.trim().split('\n').filter(Boolean).map(JSON.parse);
                            } catch (e) {
                                return [];
                            }
                        };

                        if (config.timelines) {
                            for (let tl of config.timelines) {
                                if (typeof tl.data === 'string' && tl.data.endsWith('.jsonl')) {
                                    tl.data = await fetchJsonl(tl.data);
                                }
                            }
                            this.timelines = config.timelines;
                        }

                        let rawRecords = config.recordsProcessed || [];
                        if (typeof rawRecords === 'string' && rawRecords.endsWith('.jsonl')) {
                            rawRecords = await fetchJsonl(rawRecords);
                            const aggregated = {};
                            for (const r of rawRecords) {
                                const type = r.metadata?.name || r.metadata?.data_type || r.annotation_type || r.fulcra_data_type || 'Unknown';
                                const val = typeof r.value === 'number' ? r.value : 1;
                                aggregated[type] = (aggregated[type] || 0) + val;
                            }
                            this.recordsProcessed = Object.entries(aggregated).map(([type, count]) => ({ type, count }));
                        } else {
                            this.recordsProcessed = rawRecords;
                        }
                    } catch (err) {
                        console.error("Failed to load dashboard config/data", err);
                    }
                }
            }));

            Alpine.data('timelineComponent', (timeline) => ({
                hoverIndex: null,
                parsedData: [],
                
                init() {
                    this.parsedData = (timeline.data || []).map(d => ({
                        ...d,
                        parsedDate: new Date(d.recorded_at || d.time || d.date)
                    })).sort((a, b) => a.parsedDate - b.parsedDate);
                    
                    this.$nextTick(() => {
                        if (this.parsedData.length > 0 && this.$refs.chartZone) {
                            drawD3Timeline(this.parsedData, this.$refs.chartZone, timeline.color);
                        }
                    });
                },
                
                get displayedDetails() {
                    if (this.parsedData.length === 0) return [];
                    let startIndex = this.hoverIndex !== null ? this.hoverIndex : this.parsedData.length - 1;
                    let details = [];
                    for (let i = 0; i < 5; i++) {
                        let idx = startIndex - i;
                        if (idx >= 0 && idx < this.parsedData.length) {
                            details.push({ item: this.parsedData[idx], isHovered: this.hoverIndex === idx });
                        }
                    }
                    return details;
                },
                
                getIcon(d) {
                    if (d.type === 'backup' || (d.label && d.label.toLowerCase().includes('backup'))) return '💾';
                    if (d.type === 'annotation' || (d.label && d.label.toLowerCase().includes('note'))) return '📝';
                    return '⏺️';
                },
                
                getTier(d) {
                    if (d.type === 'backup' || (d.label && d.label.toLowerCase().includes('backup'))) return 'Archival';
                    if (d.type === 'annotation' || (d.label && d.label.toLowerCase().includes('note'))) return 'Annotation';
                    return 'Event';
                },
                
                formatValue(d) {
                    if (d.value === undefined || d.value === null) return '';
                    
                    // Special formatting for ScaleAnnotations
                    if (d.metadata && d.metadata.measurement_spec && d.metadata.measurement_spec.measurement_type === 'scale') {
                        const maxVal = d.metadata.measurement_spec.scale.max_allowed || 5;
                        let textStr = `${d.value}/${maxVal}`;
                        
                        // Look for a custom label mapping
                        if (d.metadata.spec && d.metadata.spec.scale && d.metadata.spec.scale.label_mapping && d.metadata.spec.scale.label_mapping.string && d.metadata.spec.scale.label_mapping.string.mapping) {
                           const label = d.metadata.spec.scale.label_mapping.string.mapping[String(d.value)];
                           if (label) {
                               textStr += ` &mdash; <em>${label}</em>`;
                           }
                        }
                        return textStr;
                    }
                    
                    // Fallback for primitive values
                    return d.value;
                }
            }));

            Alpine.data('barChartComponent', () => ({
                init() {},
                updateChart(data) {
                    if (data && data.length > 0 && this.$refs.barChartZone) {
                        setTimeout(() => {
                            drawD3BarChart(data, this.$refs.barChartZone);
                        }, 50);
                    }
                }
            }));
        });
        
        function drawD3BarChart(data, container) {
            d3.select(container).selectAll("*").remove();
            const margin = { top: 30, right: 30, bottom: 40, left: 150 };
            const width = container.clientWidth - margin.left - margin.right || 600;
            const height = Math.max(250, data.length * 40);

            const svg = d3.select(container).append("svg")
                .attr("width", width + margin.left + margin.right)
                .attr("height", height + margin.top + margin.bottom)
                .append("g")
                .attr("transform", `translate(${margin.left},${margin.top})`);

            const sortedData = [...data].sort((a, b) => b.count - a.count);

            const x = d3.scaleLinear()
                .domain([0, d3.max(sortedData, d => d.count)])
                .range([0, width]);

            svg.append("g")
                .attr("transform", `translate(0,${height})`)
                .call(d3.axisBottom(x).ticks(5))
                .attr("color", "#a0aec0")
                .selectAll("text").style("font-family", "inherit").style("fill", "#718096");

            const y = d3.scaleBand()
                .range([0, height])
                .domain(sortedData.map(d => d.type))
                .padding(.1);

            svg.append("g")
                .call(d3.axisLeft(y))
                .attr("color", "#a0aec0")
                .selectAll("text").style("font-family", "inherit").style("fill", "#718096").style("font-size", "12px");

            const colorScale = d3.scaleOrdinal()
                .domain(sortedData.map(d => d.type))
                .range(d3.quantize(t => d3.interpolateBlues(t * 0.8 + 0.2), sortedData.length).reverse());

            svg.selectAll("myRect")
                .data(sortedData).enter().append("rect")
                .attr("x", x(0))
                .attr("y", d => y(d.type))
                .attr("width", d => x(d.count))
                .attr("height", y.bandwidth())
                .attr("fill", d => colorScale(d.type))
                .attr("rx", 4)
                .style("opacity", 0.8)
                .on("mouseover", function() { d3.select(this).style("opacity", 1).attr("stroke", "#fff").attr("stroke-width", 1); })
                .on("mouseout", function() { d3.select(this).style("opacity", 0.8).attr("stroke", "none"); });

            svg.selectAll(".text")
                .data(sortedData).enter().append("text")
                .attr("y", d => y(d.type) + y.bandwidth() / 2 + 4)
                .attr("x", d => x(d.count) + 5)
                .text(d => d.count.toLocaleString())
                .style("fill", "#f0f0f0").style("font-size", "12px").style("font-family", "inherit");
        }

        function drawD3Timeline(parsedData, container, color) {
            d3.select(container).selectAll("*").remove();
            
            const width = container.clientWidth || 800;
            const height = container.clientHeight || 120;
            const margin = {top: 20, right: 20, bottom: 30, left: 20};
            const innerWidth = width - margin.left - margin.right;
            const innerHeight = height - margin.top - margin.bottom;

            const svg = d3.select(container).append("svg")
                .attr("width", width)
                .attr("height", height);
                
            const g = svg.append("g")
                .attr("transform", `translate(${margin.left},${margin.top})`);

            const tooltip = d3.select(container).append("div")
                .attr("class", "d3-tooltip")
                .style("opacity", 0);

            if (!parsedData || parsedData.length === 0) return;

            const x = d3.scaleTime()
                .domain(d3.extent(parsedData, d => d.parsedDate))
                .range([0, innerWidth]);

            const y = d3.scaleLinear()
                .domain([0, d3.max(parsedData, d => typeof d.value === 'number' ? d.value : 1)])
                .range([innerHeight, 0]);

            // Add subtle grid lines
            g.append("g")
                .attr("class", "grid")
                .attr("transform", `translate(0,${innerHeight})`)
                .call(d3.axisBottom(x).tickSize(-innerHeight).tickFormat(""))
                .attr("stroke-opacity", 0.1)
                .attr("color", "#a0aec0");

            const hasValues = parsedData.some(d => typeof d.value === 'number');

            if (hasValues && parsedData.length > 1) {
                const line = d3.line()
                    .x(d => x(d.parsedDate))
                    .y(d => y(d.value))
                    .curve(d3.curveMonotoneX);

                g.append("path")
                    .datum(parsedData)
                    .attr("fill", "none")
                    .attr("stroke", color || "var(--chart-line-1)")
                    .attr("stroke-width", 2)
                    .attr("d", line);
            }

            g.selectAll("circle")
                .data(parsedData)
                .enter().append("circle")
                .attr("cx", d => x(d.parsedDate))
                .attr("cy", d => hasValues ? y(d.value) : innerHeight / 2)
                .attr("r", 5)
                .attr("fill", color || "var(--chart-line-1)")
                .attr("stroke", "var(--bg-dark)")
                .attr("stroke-width", 2)
                .on("mouseover", function(event, d) {
                    const idx = parsedData.indexOf(d);
                    d3.select(container).node().dispatchEvent(new CustomEvent('timeline-hover', { detail: { index: idx } }));
                    
                    d3.select(this).attr("r", 8);
                    tooltip.transition().duration(200).style("opacity", .9);
                    tooltip.html(`Value: ${d.value || 1}<br/>${d.parsedDate.toLocaleDateString()}`)
                        .style("left", (event.pageX) + "px")
                        .style("top", (event.pageY - 28) + "px");
                })
                .on("mouseout", function() {
                    d3.select(container).node().dispatchEvent(new CustomEvent('timeline-hover', { detail: { index: null } }));
                    
                    d3.select(this).attr("r", 5);
                    tooltip.transition().duration(500).style("opacity", 0);
                });

            g.append("g")
                .attr("transform", `translate(0,${innerHeight})`)
                .call(d3.axisBottom(x).ticks(5))
                .attr("color", "#a0aec0")
                .selectAll("text").style("font-family", "inherit");
        }
    </script>
</body>
</html>
